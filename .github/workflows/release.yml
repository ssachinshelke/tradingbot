name: Build Cross-Platform Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for bundle names (e.g., v1.0.2-rc1)"
        required: false
        default: "manual"
      publish_release:
        description: "Attach assets to a GitHub Release"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Existing tag name to publish to (required if publish_release=true in manual run)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Bundle
    runs-on: windows-latest
    env:
      MT5_LOGIN: "10000001"
      MT5_PASSWORD: "ci-placeholder"
      MT5_SERVER: "MetaQuotes-Demo"
      LICENSE_PUBLIC_KEY_B64: "ci-placeholder"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release zip (Windows)
        shell: powershell
        run: |
          $version = "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "manual" }
          powershell -ExecutionPolicy Bypass -File .\scripts\build_release_zip.ps1 -Version $version

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/*.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS Bundle
    runs-on: macos-latest
    env:
      MT5_LOGIN: "10000001"
      MT5_PASSWORD: "ci-placeholder"
      MT5_SERVER: "MetaQuotes-Demo"
      LICENSE_PUBLIC_KEY_B64: "ci-placeholder"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release zip (macOS)
        run: |
          chmod +x ./scripts/build_macos_bundle.sh
          VERSION="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}"
          if [ -z "$VERSION" ]; then VERSION="manual"; fi
          ./scripts/build_macos_bundle.sh "$VERSION"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: release/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: dist-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: dist-assets/macos

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          files: |
            dist-assets/windows/*.zip
            dist-assets/macos/*.zip
          generate_release_notes: true
